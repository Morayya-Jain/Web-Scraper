name: grad-jobs

# Manual-only by design: graduate postings last for weeks, and Claude
# screening costs ~$0.05-$0.20 per run. Hit "Run workflow" in the
# Actions tab when you want a fresh shortlist.

on:
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the daily Markdown back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job finder
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Commit Markdown digest + seen.json
        if: success()
        run: |
          git config user.name  "grad-job-finder-bot"
          git config user.email "noreply@github.com"
          git add jobs_*.md seen.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new digest to commit."
          else
            git commit -m "manual run: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
